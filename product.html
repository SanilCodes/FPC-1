<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPC - Product Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Header based on wireframe -->
  <header class="top-header">
    <div class="container header-inner">
      <div class="logo-section">
        <!-- The 4 photos replacing the logo section -->
        <div class="header-logos">
          <img src="assets/WhatsApp Image 2026-03-11 at 2.33.21 PM.jpeg" alt="Krushi Mitra" class="partner-logo">
          <img src="assets/WhatsApp Image 2026-03-11 at 2.33.20 PM.jpeg" alt="Uday Nayi Subhah" class="partner-logo">
          <img src="assets/WhatsApp Image 2026-03-11 at 2.33.19 PM.jpeg" alt="Yuva Mitra" class="partner-logo">
          <img src="assets/WhatsApp Image 2026-03-11 at 2.32.01 PM (1).jpeg" alt="Krishi Vikas FPC"
            class="partner-logo">
      </div>

      <div class="header-title">
        <h1>FARMER PRODUCER COMPANY</h1>
      </div>

      <div class="nav-actions">
        <button class="text-btn bubbles"><span class="text"><i class="fa-solid fa-user"></i> Login</span></button>
        <button class="btn-cart-anim">
          <div>
            <div class="cart-icon">
              <i class="fa-solid fa-cart-shopping"></i>
            </div>
          </div>
          My Cart
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="container fade-in">
      <div class="product-details-container" style="margin-top: 24px;">
        <!-- Left: Image Gallery -->
        <div class="gallery-section">
          <div class="main-image-container">
            <button class="gallery-nav nav-prev" id="btnPrev" onclick="prevImage()">
              &lang;
            </button>
            <img src="" id="mainImage" class="main-image" alt="photo" style="transition: opacity 0.15s ease;">
            <button class="gallery-nav nav-next" id="btnNext" onclick="nextImage()">
              &rang;
            </button>
          </div>
          <div class="gallery-dots">
            <span class="dot"></span>
            Ratings
          </div>
        </div>

        <!-- Right: Details -->
        <div class="info-section">
          <h1 class="details-title" id="pName">Name</h1>
          <div class="price" style="font-size: 1.5rem; margin-bottom: 8px;">₹0</div>
          <p class="details-specs" id="pSpecs">Specifications</p>

          <div class="variant-selector">
            <div class="variant-options" id="variantOptions">
              <!-- JS Injected -->
            </div>
          </div>

          <button class="btn-add-large" onclick="alert('Added to cart!')">
            ADD TO CART
          </button>
        </div>
      </div>

      <!-- Related Product container matching wireframe -->
      <div class="related-wrapper" style="position:relative; margin-top: 48px;">
        <div class="product-grid" id="relatedGrid">
          <!-- JS Injected -->
        </div>
        <div class="related-badge">Related product</div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
