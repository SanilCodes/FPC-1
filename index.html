<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPC - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Header based on wireframe -->
  <header class="top-header">
    <div class="container header-inner">
      <div class="logo-section">
        <!-- The 4 photos replacing the logo section -->
        <div class="header-logos">
          <img src="assets\WhatsApp Image 2026-03-11 at 2.33.21 PM.jpeg" alt="Krushi Mitra" class="partner-logo">
          <img src="assets\WhatsApp Image 2026-03-11 at 2.33.20 PM.jpeg" alt="Uday Nayi Subhah" class="partner-logo">
          <img src="assets\WhatsApp Image 2026-03-11 at 2.33.19 PM.jpeg" alt="Yuva Mitra" class="partner-logo">
          <img src="assets\WhatsApp Image 2026-03-11 at 2.32.01 PM (1).jpeg" alt="Krishi Vikas FPC"
            class="partner-logo">
        </div>
      </div>

      <div class="header-title">
        <h1>FARMER PRODUCER COMPANY</h1>
      </div>

      <div class="nav-actions">
        <button class="text-btn bubbles"><span class="text"><i class="fa-solid fa-user"></i> Login</span></button>
        <button class="btn-cart-anim">
          <div>
            <div class="cart-icon">
              <i class="fa-solid fa-cart-shopping"></i>
            </div>
          </div>
          My Cart
        </button>
      </div>
    </div>
  </header>

  <!-- Search & Product Section Navigation -->
  <section class="search-section">
    <div class="container">
      <div class="search-bar-wrap">
        <div class="form-control">
          <input class="input input-alt main-search" placeholder="Search" required="" type="text">
          <span class="input-border input-border-alt"></span>
        </div>
      </div>

      <!-- Category Tabs -->
      <div class="category-tabs">
        <button class="cat-tab active" data-category="vegetables">Vegetables</button>
        <button class="cat-tab" data-category="exotic">Exotic Vegetables</button>
        <button class="cat-tab" data-category="fruits">Fruits</button>
      </div>
    </div>
  </section>

  <!-- Main Product Grid -->
  <main>
    <div class="container fade-in">
      <div class="grid-animation-wrapper">
        <div class="product-grid" id="productGrid">
          <!-- Injected via JS -->
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
